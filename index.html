<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyMarket - Buy Easy. Sell Smart.</title>
  <meta name="description" content="EasyMarket is the modern marketplace to buy and sell electronics, fashion, cars, and more.">
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>
    /* Specific Home Page Styles */
    .section-title {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      color: var(--text-dark);
      text-align: center;
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1.5rem;
      margin-bottom: 4rem;
    }
    .category-card {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      font-weight: 600;
    }
    .category-card:hover {
      border-color: var(--primary-blue);
      color: var(--primary-blue);
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }
  </style>
</head>
<body>
  <main>
    <div id="home-slideshow" class="slideshow-container">
      <!-- Slides injected via JS -->
    </div>

    <div class="container ad-section" id="promoted-section" style="display:none; margin-bottom: 4rem;">
      <h2 class="section-title" style="display:flex; align-items:center; justify-content:center; gap:0.8rem; color: #1e293b;">
        <i class="fa-solid fa-star" style="color: #febd69"></i>
        Promoted Deals
      </h2>
      <div class="product-grid" id="promoted-products">
        <!-- JS will render ads here -->
      </div>
    </div>

    <div class="container">
      <h2 class="section-title">Shop by Category</h2>
      <div class="categories-grid" id="categories-container">
        <!-- JS will render categories here -->
      </div>

      <section class="mobile-download-section">
        <div class="mobile-download-card">
          <div>
            <p style="font-size:0.8rem; text-transform:uppercase; letter-spacing:0.18em; color:#febd69; font-weight:700;">Mobile download</p>
            <h3>Download EasyMarket for faster browsing on the go</h3>
            <p>Use the marketplace from your phone to browse deals, contact sellers, and list your items quickly.</p>
          </div>
          <div class="mobile-download-actions">
            <a href="#" onclick="event.preventDefault(); openSupportMail('EasyMarket App Download');" class="btn btn-primary">Get Android App</a>
            <a href="#" onclick="event.preventDefault(); openSupportMail('EasyMarket App Download');" class="btn btn-secondary">Get iOS App</a>
          </div>
        </div>
      </section>

      <h2 class="section-title">Featured Products</h2>
      <div class="product-grid mb-4" id="featured-products">
        <!-- JS will render featured products here -->
      </div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
