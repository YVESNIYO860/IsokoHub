<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Products - IsokoHub</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>
    .products-layout {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
    }
    .filters-sidebar {
      width: 250px;
      flex-shrink: 0;
      background: white;
      padding: 1.5rem;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      align-self: flex-start;
      position: sticky;
      top: 100px;
    }
    .filters-sidebar h3 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
    }
    .filter-select {
      width: 100%;
      padding: 0.7rem 0.8rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: white;
      color: var(--text-dark);
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    .products-main {
      flex: 1;
    }
    .search-summary {
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }
    
    @media (max-width: 768px) {
      .products-layout {
        flex-direction: column;
      }
      .filters-sidebar {
        width: 100%;
        position: static;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <div class="products-layout">
        <!-- Sidebar -->
        <aside class="filters-sidebar">
          <h3>Categories</h3>
          <select id="category-filter-select" class="filter-select">
            <option value="all">All Categories</option>
          </select>

          <h3>Condition</h3>
          <select id="condition-filter-select" class="filter-select">
            <option value="all">All Conditions</option>
            <option value="New">New</option>
            <option value="Used">Used</option>
          </select>

          <h3>District</h3>
          <select id="district-filter-select" class="filter-select">
            <option value="all">All Districts</option>
          </select>
        </aside>

        <!-- Main Product Area -->
        <div class="products-main" style="margin-bottom: 4rem;">
          <div class="search-summary" id="search-summary">
            <h2>All Products</h2>
          </div>
          <div class="product-grid" id="products-container" style="margin-top: 0">
            <!-- Products rendered here -->
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
