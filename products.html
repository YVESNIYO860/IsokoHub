<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Products - EasyMarket</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>
    .products-layout {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
    }
    .filters-sidebar {
      width: 250px;
      flex-shrink: 0;
      background: white;
      padding: 1.5rem;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      align-self: flex-start;
      position: sticky;
      top: 100px;
    }
    .filters-sidebar h3 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
    }
    .filter-item {
      display: block;
      padding: 0.5rem 0;
      color: var(--text-dark);
      cursor: pointer;
      border-radius: 4px;
      padding-left: 0.5rem;
    }
    .filter-item:hover, .filter-item.active {
      background-color: #f1f5f9;
      color: var(--primary-blue);
      font-weight: 500;
    }
    .products-main {
      flex: 1;
    }
    .search-summary {
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }
    
    @media (max-width: 768px) {
      .products-layout {
        flex-direction: column;
      }
      .filters-sidebar {
        width: 100%;
        position: static;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <div class="products-layout">
        <!-- Sidebar -->
        <aside class="filters-sidebar">
          <h3>Categories</h3>
          <div id="category-filters" class="mb-3">
            <span class="filter-item active" data-cat="all">All Categories</span>
          </div>

          <h3>Condition</h3>
          <div id="condition-filters">
            <span class="filter-item active" data-cond="all">All Conditions</span>
            <span class="filter-item" data-cond="New">New</span>
            <span class="filter-item" data-cond="Used">Used</span>
          </div>
        </aside>

        <!-- Main Product Area -->
        <div class="products-main" style="margin-bottom: 4rem;">
          <div class="search-summary" id="search-summary">
            <h2>All Products</h2>
          </div>
          <div class="product-grid" id="products-container" style="margin-top: 0">
            <!-- Products rendered here -->
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
