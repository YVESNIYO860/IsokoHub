<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - IsokoHub</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1.35.7/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/firebase-config.js"></script>
</head>
<body>
  <main>
    <div class="container">
      <div class="auth-container">
        <h2 class="auth-title">Create an Account</h2>
        <div id="error-msg" class="text-danger text-center mb-2 d-none"></div>
        <form id="signup-form">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="name" class="form-control" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" required placeholder="name@example.com">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" required minlength="6" placeholder="At least 6 characters">
          </div>
          <div class="form-group form-check">
            <input type="checkbox" id="accept-terms-signup" class="form-check-input" required>
            <label for="accept-terms-signup" class="form-check-label" style="font-size:0.95rem;">
              I agree to the <a href="terms.html" target="_blank" style="color:var(--primary-blue); text-decoration:underline;">Terms and Conditions</a>
            </label>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
          <button id="google-signup-btn" type="button" class="btn btn-google btn-block mt-2">
            <span class="google-logo" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                <path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.24-.17-1.82H9v3.44h4.84c-.21 1.12-.84 2.07-1.79 2.71v2.24h2.9c1.7-1.57 2.68-3.88 2.68-6.57z"/>
                <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.24c-.8.54-1.83.86-3.06.86-2.35 0-4.34-1.58-5.05-3.71H.99v2.33C2.47 15.88 5.53 18 9 18z"/>
                <path fill="#FBBC05" d="M3.95 10.73c-.18-.54-.28-1.12-.28-1.73s.1-1.19.28-1.73V4.94H.99A8.98 8.98 0 000 9c0 1.48.35 2.88.99 4.06l2.96-2.33z"/>
                <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.43 1.34l2.57-2.57C13.44.96 11.4 0 9 0 5.53 0 2.47 2.12.99 5.06l2.96 2.33C4.66 5.16 6.65 3.58 9 3.58z"/>
              </svg>
            </span>
            <span>Continue with Google</span>
          </button>
          <p class="text-center mt-2" style="font-size:0.9rem; color:#555;">
            By clicking Google login you accept the <a href="terms.html" target="_blank" style="color:var(--primary-blue); text-decoration:underline;">Terms and Conditions</a>.
          </p>
        </form>
        <p class="text-center mt-2">
          Already have an account? <a href="login.html" style="color:var(--primary-blue)">Log in</a>
        </p>
      </div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
