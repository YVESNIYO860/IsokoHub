<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Article... - IsokoHub Blog</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .post-hero {
      position: relative;
      height: 50vh;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      overflow: hidden;
      background: #0f172a;
    }
    .post-hero-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(0deg, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0) 100%);
      z-index: 1;
    }
    .post-hero img {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.6;
    }
    .post-header {
      position: relative;
      z-index: 2;
      max-width: 900px;
      padding: 0 1.5rem;
    }
    .post-category {
      background: #febd69;
      color: #131921;
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-weight: 800;
      font-size: 0.8rem;
      display: inline-block;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
    }
    .post-title {
      font-size: 3.5rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      line-height: 1.1;
    }
    .post-meta {
      font-size: 0.9rem;
      opacity: 0.8;
      display: flex;
      justify-content: center;
      gap: 2rem;
    }
    
    .article-container {
      max-width: 800px;
      margin: -5rem auto 5rem auto;
      background: white;
      position: relative;
      z-index: 10;
      padding: 4rem;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    
    .article-content {
      font-size: 1.25rem;
      line-height: 1.8;
      color: #334155;
    }
    .article-content h3 {
      font-size: 2rem;
      color: #0f172a;
      margin: 3rem 0 1.5rem 0;
    }
    .article-content p {
      margin-bottom: 2rem;
    }
    .article-content blockquote {
      border-left: 5px solid #febd69;
      padding-left: 2rem;
      font-style: italic;
      font-size: 1.5rem;
      color: #475569;
      margin: 3rem 0;
    }
    .article-content ul {
      margin-bottom: 2rem;
      padding-left: 1.5rem;
    }
    .article-content li {
      margin-bottom: 1rem;
    }

    @media (max-width: 768px) {
      .post-title { font-size: 2.5rem; }
      .article-container { padding: 2rem; margin-top: -3rem; border-radius: 0; }
    }
  </style>
</head>
<body>
  <div id="loading-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; align-items:center; justify-content:center;">
    <i class="fa-solid fa-spinner fa-spin fa-3x" style="color:var(--primary-blue)"></i>
  </div>

  <div id="post-view" style="display:none;">
    <header class="post-hero">
      <a href="index.html" class="home-return-btn" aria-label="Go to home" title="Go to home" style="position:absolute; top:1.25rem; right:1.25rem; z-index:3; width:2.8rem; height:2.8rem; display:flex; align-items:center; justify-content:center; border-radius:999px; background:rgba(255,255,255,0.16); color:white; border:1px solid rgba(255,255,255,0.26); backdrop-filter: blur(8px); text-decoration:none; font-size:1.05rem;">
        <i class="fa-solid fa-house"></i>
      </a>
      <img id="hero-img" src="" alt="Post Header">
      <div class="post-hero-overlay"></div>
      <div class="post-header">
        <span id="post-category" class="post-category">CATEGORY</span>
        <h1 id="post-title" class="post-title">Loading...</h1>
        <div class="post-meta">
          <span><i class="fa-solid fa-calendar"></i> <span id="post-date">...</span></span>
          <span><i class="fa-solid fa-user-edit"></i> <span id="post-author">...</span></span>
        </div>
      </div>
    </header>

    <main class="container">
      <article class="article-container">
        <div id="post-content" class="article-content">
          <!-- Content injected via JS -->
        </div>
        <div style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid #eee; text-align:center;">
          <a href="about.html#blog" class="btn btn-secondary" style="border-radius:50px; padding: 1rem 2rem;">&larr; Back to Blog</a>
        </div>
      </article>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/blog-data.js"></script>
  <script src="js/blog-viewer.js"></script>
</body>
</html>
