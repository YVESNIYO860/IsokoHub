<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sell Product - EasyMarket</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>
    .sell-container {
      max-width: 600px;
      margin: 2rem auto;
      background: white;
      padding: 2rem;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
    }

    .image-picker-box {
      border: 1px dashed var(--border-color);
      border-radius: 12px;
      padding: 0.85rem;
      background: #f8fafc;
    }

    .image-picker-box input[type="file"] {
      width: 100%;
      min-height: 44px;
      padding: 0.5rem;
    }

    .image-preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 0.6rem;
      margin-top: 0.8rem;
    }

    .image-preview-item {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      background: white;
      aspect-ratio: 1;
      cursor: pointer;
    }

    .image-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-preview-item .preview-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.7);
      color: white;
      font-size: 0.65rem;
      text-align: center;
      padding: 0.2rem;
    }

    @media (max-width: 600px) {
      .sell-container {
        padding: 1rem;
      }

      .image-preview-grid {
        grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <div class="sell-container">
        <h2 class="mb-3">Sell a New Product</h2>
        <div id="sell-error" class="text-danger mb-2 d-none"></div>
        <form id="sell-form">
          <div class="form-group">
            <label class="form-label">Product Name</label>
            <input type="text" id="prod-name" class="form-control" required placeholder="e.g. iPhone 13 Pro">
          </div>
          
          <div class="form-group">
            <label class="form-label">Category</label>
            <select id="prod-category" class="form-control" required>
              <option value="">Select a category</option>
              <option value="Electronics">Electronics</option>
              <option value="Fashion">Fashion</option>
              <option value="Shoes">Shoes</option>
              <option value="Phones">Phones</option>
              <option value="Cars">Cars</option>
              <option value="Houses & Rents">Houses & Rents</option>
              <option value="Others">Others</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Condition</label>
            <select id="prod-condition" class="form-control" required>
              <option value="New">New (Factory Sealed)</option>
              <option value="Used">Used (Still Works Excellent)</option>
            </select>
          </div>

          <div id="housing-fields" style="display:none;">
            <div class="form-group">
              <label class="form-label">Property Type</label>
              <select id="prod-property-type" class="form-control">
                <option value="">Select property type</option>
                <option value="Apartment">Apartment</option>
                <option value="House">House</option>
                <option value="Room">Room</option>
                <option value="Office">Office</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Listing Type</label>
              <select id="prod-listing-type" class="form-control">
                <option value="">Select listing type</option>
                <option value="Daily">Daily</option>
                <option value="Weekly">Weekly</option>
                <option value="Monthly">Monthly</option>
                <option value="Yearly">Yearly</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">House Video (Max 20MB)</label>
              <input type="file" id="prod-video" class="form-control" accept="video/*">
              <small class="text-muted d-block mt-1">Upload a local video for the house or rental listing. Maximum size is 20MB.</small>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Price (RWF)</label>
            <input type="number" id="prod-price" class="form-control" required min="100" step="1" inputmode="numeric" placeholder="10000">
            <small class="text-muted d-block mt-1">Enter the amount in Rwandan francs. The product will be saved with RWF pricing.</small>
          </div>

          <div class="form-group">
            <label class="form-label">Product Photos (Min 3, Max 6)</label>
            <div class="image-picker-box">
              <input type="file" id="prod-images" class="form-control" accept="image/*" multiple required>
              <div id="image-preview-grid" class="image-preview-grid"></div>
            </div>
            <small class="text-muted d-block mt-1">Tap to select multiple photos from your device. You can preview them before posting.</small>
          </div>

          <div class="form-group">
            <label class="form-label">District</label>
            <select id="prod-district" class="form-control" required>
              <option value="">Select your district</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Seller WhatsApp / Phone Number</label>
            <input type="tel" id="prod-phone" class="form-control" required placeholder="e.g. +250 788 123 456">
          </div>

          <div class="form-group">
            <label class="form-label">Full Description</label>
            <textarea id="prod-description" class="form-control" rows="5" required placeholder="Tell us more about the product features, history, and current condition..."></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-block">List Product</button>
        </form>
      </div>
    </div>
  </main>
  
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sell.js"></script>
</body>
</html>
