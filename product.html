<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - IsokoHub</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
  <!-- Firebase SDK -->
  <!-- Supabase SDK (Auth, User Management) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1.35.7/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js?v=2"></script>
  <!-- Firebase SDK (Firestore for product database) -->

  <style>
    .product-detail-container {
      margin: 2rem auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 1px rgba(0,0,0,0.1);
      overflow: hidden;
      border: 1px solid var(--border-color);
      display: flex;
      min-height: 600px;
    }
    .product-image-box {
      flex: 1.5;
      background-color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      border-right: 1px solid var(--border-color);
    }
    .product-main-img {
      max-width: 100%;
      max-height: 500px;
      object-fit: contain;
    }
    .product-info-box {
      flex: 1;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      background: #fafafa;
    }
    .pd-header { border-bottom: 1px solid #ddd; padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
    .pd-category { color: #007185; font-size: 0.9rem; font-weight: 500; }
    .pd-title { font-size: 1.8rem; line-height: 1.3; margin: 0.5rem 0; color: #0f1111; }
    .pd-rating { color: #ffa41c; margin-bottom: 1rem; font-size: 0.9rem; }
    .pd-price-row { margin-bottom: 1.5rem; }
    .pd-price-label { font-size: 0.9rem; color: #565959; }
    .pd-price { font-size: 1.8rem; color: #B12704; font-weight: 500; }
    
    .pd-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* Advanced Description Sections */
    .pd-details-section {
      margin-top: 3rem;
      padding: 2rem;
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 8px;
    }
    .pd-section-title {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--primary-blue);
      display: inline-block;
      color: #0f1111;
    }
    .pd-specs-grid {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 1rem;
      font-size: 0.95rem;
    }
    .spec-label { font-weight: 700; color: #565959; background: #f3f3f3; padding: 0.5rem 1rem; }
    .spec-value { padding: 0.5rem 1rem; border-bottom: 1px solid #eee; }

    .feature-list { list-style: disc; padding-left: 1.5rem; margin-top: 1rem; }
    .feature-list li { margin-bottom: 0.8rem; color: #333; }

    .product-detail-shell {
      display: grid;
      grid-template-columns: 1.15fr 0.95fr;
      gap: 1.5rem;
      align-items: start;
      margin: 2rem 0;
    }

    .product-gallery-card,
    .product-info-card {
      background: white;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }

    .product-gallery-card {
      padding: 1rem;
    }

    .gallery-main {
      position: relative;
      background: #f8fafc;
      border-radius: 16px;
      padding: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 420px;
    }

    .product-main-img {
      max-width: 100%;
      max-height: 470px;
      object-fit: contain;
      cursor: zoom-in;
      border-radius: 12px;
    }

    .gallery-nav,
    .gallery-modal-nav,
    .gallery-zoom-btn,
    .gallery-modal-close {
      border: none;
      background: rgba(15, 23, 42, 0.8);
      color: white;
      border-radius: 999px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .gallery-zoom-btn {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      width: auto;
      padding: 0 1rem;
      gap: 0.35rem;
      border-radius: 999px;
      font-weight: 600;
    }

    .gallery-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1;
    }

    .gallery-prev,
    .gallery-modal-prev {
      left: 0.75rem;
    }

    .gallery-next,
    .gallery-modal-next {
      right: 0.75rem;
    }

    .gallery-thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
      gap: 0.6rem;
      margin-top: 0.9rem;
    }

    .gallery-thumb {
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 0.25rem;
      background: #f8fafc;
      cursor: pointer;
      overflow: hidden;
    }

    .gallery-thumb.active {
      border-color: var(--primary-blue);
    }

    .gallery-thumb img {
      width: 100%;
      height: 72px;
      object-fit: cover;
      border-radius: 8px;
    }

    .product-info-card {
      padding: 1.5rem;
    }

    .pd-header {
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }

    .review-summary {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
      color: #475569;
      font-size: 0.95rem;
    }

    .review-summary-stars {
      color: #f59e0b;
      letter-spacing: 0.08rem;
    }

    .review-summary-score {
      font-weight: 700;
      color: #0f172a;
    }

    .review-card {
      margin-top: 1.25rem;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 1rem;
      background: #f8fafc;
    }

    .review-card-header h3 {
      margin-bottom: 0.25rem;
    }

    .review-card-header p {
      color: #64748b;
      margin-bottom: 0.85rem;
      font-size: 0.95rem;
    }

    .review-form {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .rating-picker {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 0.25rem;
    }

    .rating-star {
      border: none;
      background: transparent;
      color: #cbd5e1;
      font-size: 1.25rem;
      cursor: pointer;
      padding: 0;
    }

    .rating-star.active {
      color: #f59e0b;
    }

    .review-textarea {
      resize: vertical;
      min-height: 110px;
    }

    .review-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .review-item {
      border-top: 1px solid #e2e8f0;
      padding-top: 0.8rem;
    }

    .review-item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.35rem;
    }

    .review-author {
      font-weight: 700;
      color: #0f172a;
    }

    .review-rating {
      color: #f59e0b;
      font-size: 0.9rem;
    }

    .review-comment {
      color: #475569;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .review-empty {
      color: #64748b;
      font-size: 0.95rem;
      padding: 0.5rem 0;
    }

    .review-star-active {
      color: #f59e0b;
    }

    .review-star-inactive {
      color: #cbd5e1;
    }

    .gallery-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      background: rgba(2, 6, 23, 0.94);
      backdrop-filter: blur(8px);
    }

    .gallery-modal[aria-hidden="false"] {
      display: flex;
    }

    .gallery-modal-backdrop {
      position: absolute;
      inset: 0;
      background: transparent;
    }

    .gallery-modal-body {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: none;
      max-height: none;
      display: grid;
      place-items: center;
      padding: 1rem;
      z-index: 1;
    }

    .gallery-modal-image {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 0;
      box-shadow: none;
      background: transparent;
      padding: 0;
      transform: translate(var(--pan-x, 0px), var(--pan-y, 0px)) scale(var(--zoom-level, 1));
      transform-origin: center center;
      transition: transform 0.2s ease;
      cursor: zoom-in;
      user-select: none;
      -webkit-user-drag: none;
    }

    .gallery-modal-image.is-pannable {
      cursor: grab;
    }

    .gallery-modal-image.is-pannable:active {
      cursor: grabbing;
    }

    .gallery-controls {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.6rem;
      z-index: 2;
    }

    .gallery-controls button {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: none;
      background: rgba(15, 23, 42, 0.9);
      color: white;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 1rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.24);
    }

    .gallery-modal-close {
      position: absolute;
      top: 0.9rem;
      right: 0.9rem;
      z-index: 2;
    }

    .gallery-modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
    }

    .gallery-modal-prev {
      left: 0.9rem;
    }

    .gallery-modal-next {
      right: 0.9rem;
    }

    .add-cart-btn {
      margin-top: 1rem;
      padding: 1rem;
      font-size: 1.05rem;
      background: linear-gradient(135deg, #febd69, #f59e0b);
      color: #131921;
      border: none;
    }

    @media (max-width: 900px) {
      .product-detail-shell {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .product-gallery-card,
      .product-info-card {
        border-radius: 16px;
      }

      .gallery-main {
        min-height: 320px;
      }

      .gallery-modal-body {
        width: min(96vw, 760px);
      }

      .gallery-controls {
        bottom: 0.75rem;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 0 0.75rem;
      }

      .product-info-card {
        padding: 1rem;
      }

      .gallery-main {
        min-height: 240px;
        padding: 0.5rem;
      }

      .gallery-zoom-btn {
        padding: 0 0.8rem;
        font-size: 0.85rem;
        height: 38px;
      }

      .gallery-thumb img {
        height: 56px;
      }

      .gallery-thumbs {
        grid-template-columns: repeat(auto-fit, minmax(58px, 1fr));
        gap: 0.45rem;
      }

      .review-item-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .gallery-modal {
        padding: 0;
      }

      .gallery-modal-body {
        padding: 0.7rem;
      }

      .gallery-modal-close,
      .gallery-controls button,
      .gallery-modal-nav {
        width: 38px;
        height: 38px;
      }

      .gallery-modal-image {
        max-height: 100vh;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="container" id="product-wrapper">
      <!-- Injected via JS -->
      <div style="text-align: center; padding: 5rem;" id="loading-state">
        <h2 class="text-muted">Loading product...</h2>
      </div>
    </div>
  </main>
  
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/claude.js"></script>
  <script src="js/product-details.js"></script>
</body>
</html>
