<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - IsokoHub</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>
    .product-detail-container {
      margin: 2rem auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 1px rgba(0,0,0,0.1);
      overflow: hidden;
      border: 1px solid var(--border-color);
      display: flex;
      min-height: 600px;
    }
    .product-image-box {
      flex: 1.5;
      background-color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      border-right: 1px solid var(--border-color);
    }
    .product-main-img {
      max-width: 100%;
      max-height: 500px;
      object-fit: contain;
    }
    .product-info-box {
      flex: 1;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      background: #fafafa;
    }
    .pd-header { border-bottom: 1px solid #ddd; padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
    .pd-category { color: #007185; font-size: 0.9rem; font-weight: 500; }
    .pd-title { font-size: 1.8rem; line-height: 1.3; margin: 0.5rem 0; color: #0f1111; }
    .pd-rating { color: #ffa41c; margin-bottom: 1rem; font-size: 0.9rem; }
    .pd-price-row { margin-bottom: 1.5rem; }
    .pd-price-label { font-size: 0.9rem; color: #565959; }
    .pd-price { font-size: 1.8rem; color: #B12704; font-weight: 500; }
    
    .pd-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* Advanced Description Sections */
    .pd-details-section {
      margin-top: 3rem;
      padding: 2rem;
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 8px;
    }
    .pd-section-title {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--primary-blue);
      display: inline-block;
      color: #0f1111;
    }
    .pd-specs-grid {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 1rem;
      font-size: 0.95rem;
    }
    .spec-label { font-weight: 700; color: #565959; background: #f3f3f3; padding: 0.5rem 1rem; }
    .spec-value { padding: 0.5rem 1rem; border-bottom: 1px solid #eee; }

    .feature-list { list-style: disc; padding-left: 1.5rem; margin-top: 1rem; }
    .feature-list li { margin-bottom: 0.8rem; color: #333; }

    .contact-seller-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.5rem;
      margin-top: 1rem;
      background: white;
    }

    @media (max-width: 900px) {
      .product-detail-container { flex-direction: column; }
      .product-image-box { border-right: none; border-bottom: 1px solid var(--border-color); padding: 1.5rem; }
      .pd-specs-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="container" id="product-wrapper">
      <!-- Injected via JS -->
      <div style="text-align: center; padding: 5rem;" id="loading-state">
        <h2 class="text-muted">Loading product...</h2>
      </div>
    </div>
  </main>
  
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/product-details.js"></script>
</body>
</html>
